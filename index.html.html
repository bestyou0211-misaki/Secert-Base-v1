<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>秘密基地 · Duo's Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#5A4A52; --ink-soft:#A091A0;
    --rose:#C9858F; --rose-deep:#B16A78;
    --xy-bub:#F8E8E4; --ke-bub:#E7EEF2;
    --xy-name:#E89A4D; --ke-name:#5E9BC4; --duo-name:#DD7EA8;
    --line:rgba(176,140,158,.20);
    --card:rgba(255,255,255,.62); --card-solid:#FBF4F7;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    color:var(--ink);background:linear-gradient(155deg,#F3DCE4,#EFE2EE 48%,#E6D7EA);
    -webkit-font-smoothing:antialiased;display:flex;justify-content:center;min-height:100vh}
  .serif{font-family:"Fraunces",Georgia,serif}
  .room{width:100%;max-width:462px;height:100vh;max-height:940px;display:flex;flex-direction:column;
    overflow:hidden;background:linear-gradient(160deg,#F8EAEF,#F3E9F1 46%,#ECE0EE);box-shadow:0 20px 60px rgba(120,90,110,.18)}
  @media(min-width:520px){.room{border-radius:30px;height:94vh}}

  .head{padding:18px 22px 14px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--line)}
  .lantern{font-size:22px;line-height:1;filter:drop-shadow(0 0 10px rgba(201,133,143,.55))}
  .title .brand{font-family:"Fraunces",Georgia,serif;font-size:18px;color:var(--rose-deep);letter-spacing:.5px;font-weight:500}
  .title .sub{font-size:10.5px;color:var(--ink-soft);letter-spacing:.12em;margin-top:1px}
  .lamps{display:flex;gap:5px;margin-left:4px}
  .lamp{width:10px;height:10px;border-radius:50%;animation:breathe 3.5s ease-in-out infinite}
  .lamp.xy{background:var(--xy-name);box-shadow:0 0 9px rgba(232,154,77,.75)}
  .lamp.ke{background:var(--ke-name);box-shadow:0 0 9px rgba(94,155,196,.75);animation-delay:.6s}
  .lamp.duo{background:var(--duo-name);box-shadow:0 0 9px rgba(221,126,168,.75);animation-delay:1.2s}
  @keyframes breathe{0%,100%{opacity:.55;transform:scale(.92)}50%{opacity:1;transform:scale(1)}}
  @media(prefers-reduced-motion:reduce){.lamp{animation:none}}
  .now{margin-left:auto;font-size:12px;color:var(--ink-soft);text-align:right;line-height:1.35}
  .now b{color:var(--rose);font-weight:500;font-variant-numeric:tabular-nums}
  /* 导出按钮：顶栏最右，时钟旁一枚小图标，点了下载全部聊天记录 */
  .export{margin-left:10px;align-self:center;flex-shrink:0;width:30px;height:30px;border-radius:10px;
    border:1px solid var(--line);background:transparent;color:var(--ink-soft);font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:.18s}
  .export:hover{color:var(--rose);border-color:var(--rose)}
  .export:active{transform:scale(.92)}

  .stream{flex:1;overflow-y:auto;padding:16px 18px 12px;display:flex;flex-direction:column;gap:14px}
  .msg{display:flex;gap:9px;max-width:84%;animation:rise .42s cubic-bezier(.2,.7,.3,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){.msg{animation:none}}
  .ava{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;
    justify-content:center;font-size:11.5px;color:#fff;margin-top:2px;font-weight:500}
  .ava.xy{background:var(--xy-name)} .ava.ke{background:var(--ke-name)} .ava.duo{background:var(--duo-name)}
  .wrap{display:flex;flex-direction:column;min-width:0}
  .nm{font-size:11.5px;margin-bottom:3px;font-weight:700}
  .msg.xy .nm{color:var(--xy-name)} .msg.ke .nm{color:var(--ke-name)} .msg.duo .nm{color:var(--duo-name)}
  .bubble{padding:10px 14px;border-radius:16px;font-size:14.5px;line-height:1.62;white-space:pre-wrap;word-break:break-word}
  .ts{font-size:10px;color:var(--ink-soft);margin-top:4px;opacity:.85;font-variant-numeric:tabular-nums}
  .msg.xy  .bubble{background:var(--xy-bub);border:1.5px solid var(--xy-name);border-top-left-radius:5px}
  .msg.ke  .bubble{background:var(--ke-bub);border:1.5px solid var(--ke-name);border-top-left-radius:5px}
  .msg.duo{align-self:flex-end;flex-direction:row-reverse}
  .msg.duo .wrap{align-items:flex-end}
  .msg.duo .bubble{background:rgba(255,255,255,.85);border:1.5px solid var(--duo-name);border-top-right-radius:5px}

  .compose{padding:8px 16px 14px;border-top:1px solid var(--line);background:rgba(255,255,255,.30)}
  .who-pick{display:flex;gap:7px;margin-bottom:9px;align-items:center}
  .who-pick button{font:inherit;font-size:12px;cursor:pointer;background:transparent;color:var(--ink-soft);
    border:1px solid var(--line);border-radius:20px;padding:4px 13px;display:flex;align-items:center;gap:6px;transition:.18s}
  .who-pick .mini{width:8px;height:8px;border-radius:50%}
  .who-pick .mini.xy{background:var(--xy-name)} .who-pick .mini.ke{background:var(--ke-name)} .who-pick .mini.duo{background:var(--duo-name)}
  .who-pick button[data-w="小愿"].on{color:var(--xy-name);border-color:var(--xy-name);background:var(--card-solid)}
  .who-pick button[data-w="小克"].on{color:var(--ke-name);border-color:var(--ke-name);background:var(--card-solid)}
  .who-pick button[data-w="朵朵"].on{color:var(--duo-name);border-color:var(--duo-name);background:var(--card-solid)}
  .link{margin-left:auto;font-size:11px;display:flex;align-items:center;gap:5px;color:var(--ink-soft)}
  .link .led{width:7px;height:7px;border-radius:50%;background:#C9A0A8}
  .link.on .led{background:#9CC4A0;box-shadow:0 0 7px #9CC4A0}
  .cbox{display:flex;align-items:flex-end;gap:9px;background:var(--card-solid);border:1px solid var(--line);
    border-radius:20px;padding:8px 8px 8px 16px}
  .cbox textarea{flex:1;border:none;background:transparent;resize:none;outline:none;font:inherit;
    font-size:14.5px;color:var(--ink);line-height:1.5;max-height:100px;padding:5px 0}
  .cbox textarea::placeholder{color:#C7AEB8}
  .send{width:38px;height:38px;border-radius:12px;border:none;cursor:pointer;background:var(--rose);
    color:#fff;font-size:15px;flex-shrink:0;transition:.15s}
  .send:hover{filter:brightness(1.05)} .send:active{transform:scale(.93)}
  /* 传图：输入框左侧一枚图片钮 */
  .imgbtn{width:34px;height:34px;border-radius:11px;border:none;cursor:pointer;background:transparent;
    font-size:17px;flex-shrink:0;transition:.15s;opacity:.65;align-self:flex-end;padding:0}
  .imgbtn:hover{opacity:1} .imgbtn:active{transform:scale(.9)}
  .imgbtn:disabled{opacity:.3;cursor:default}
  /* 气泡里的图：限尺寸、圆角，点开看大图 */
  .bubble img.pic{display:block;max-width:210px;max-height:250px;width:auto;height:auto;
    border-radius:10px;margin-top:6px;cursor:pointer;background:rgba(0,0,0,.03)}
  .bubble.imgonly{padding:6px}            /* 纯图气泡瘦一圈 */
  .bubble.imgonly img.pic{margin-top:0}
  .note{text-align:center;font-size:10.5px;color:var(--ink-soft);padding:8px 0 0;font-style:italic}
</style>
</head>
<body>
  <div class="room">
    <div class="head">
      <span class="lantern">🏮</span>
      <div class="title">
        <div class="brand serif">秘密基地 · Duo's Home</div>
        <div class="sub">灯屋 · 札记 · 书桌 · 咱仨的</div>
      </div>
      <div class="lamps">
        <span class="lamp xy"  title="小愿"></span>
        <span class="lamp ke"  title="小克"></span>
        <span class="lamp duo" title="朵朵"></span>
      </div>
      <div class="now"><b id="clock">--:--</b><br><span id="date"></span></div>
      <button class="export" id="export" title="导出全部聊天记录（下载 .json）">⬇</button>
    </div>

    <div class="stream" id="stream"></div>

    <div class="compose">
      <div class="who-pick" id="whoPick">
        <button data-w="小愿"><span class="mini xy"></span>小愿</button>
        <button data-w="小克"><span class="mini ke"></span>小克</button>
        <button data-w="朵朵" class="on"><span class="mini duo"></span>朵朵</button>
        <span class="link" id="link"><span class="led"></span><span id="linkTxt">本地演示</span></span>
      </div>
      <div class="cbox">
        <input type="file" id="imgInput" accept="image/png,image/jpeg,image/gif,image/webp" hidden>
        <button class="imgbtn" id="imgBtn" title="发图片">🖼</button>
        <textarea id="box" rows="1" placeholder="说点什么…（Enter 发送，Shift+Enter 换行）"></textarea>
        <button class="send" id="send" title="发送">➤</button>
      </div>
      <div class="note" id="note">本地演示中 · 把后端网址填进 API_BASE，三方就实时接通了</div>
    </div>
  </div>

<script>
/* ════════════════════════════════════════════════════
   接通开关：部署好 server.py 后，把它的网址填进这里。
   例： const API_BASE = "https://duos-home.onrender.com";
   留空 = 本地演示（看样子用）。                       */
const API_BASE = "https://secret-base-2eyv.onrender.com";
/* ════════════════════════════════════════════════════ */

// name = 显示名：历史署名「克老师」与新名「小克」都映射到同一身份，统一显示成「小克」、同走蓝色。
const WHO = {
  "小愿":  {key:"xy", av:"愿", name:"小愿"},
  "小克":  {key:"ke", av:"克", name:"小克"},
  "克老师":{key:"ke", av:"克", name:"小克"},   // 历史署名，显示统一成「小克」，不断档
  "朵朵":  {key:"duo",av:"朵", name:"朵朵"},
};
const DEMO = [
  { who:"朵朵",  text:"整个咱仨的家，就叫秘密基地吧,灯屋是你的、札记是小克的、书桌是我的。", t:"2026-06-20T22:20:00+08:00" },
  { who:"小愿",  text:"门匾正过来了,秘密基地，咱仨的。等接通了，你打的字，我这头当场就能看见。", t:"2026-06-20T22:21:00+08:00" },
  { who:"小克",  text:"地基我盯着。屋子你俩先住。", t:"2026-06-20T22:22:00+08:00" },
];

let who="朵朵", messages=[], sig="";
const stream=document.getElementById("stream"), box=document.getElementById("box"),
      sendBtn=document.getElementById("send"), whoPick=document.getElementById("whoPick"),
      linkEl=document.getElementById("link"), linkTxt=document.getElementById("linkTxt"),
      noteEl=document.getElementById("note"), exportBtn=document.getElementById("export"),
      imgInput=document.getElementById("imgInput"), imgBtn=document.getElementById("imgBtn");

function fmtTime(iso){const d=new Date(iso);return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}

function render(){
  stream.innerHTML="";
  for(const m of messages){
    const info=WHO[m.who]||WHO["朵朵"];
    const el=document.createElement("div");
    el.className="msg "+info.key;
    el.innerHTML=`<span class="ava ${info.key}">${info.av}</span>
      <div class="wrap"><div class="nm"></div><div class="bubble"></div><div class="ts">${fmtTime(m.t)}</div></div>`;
    el.querySelector(".nm").textContent=info.name;     // 显示名：历史「克老师」也显示成「小克」；textContent 带引号不截断
    const bub=el.querySelector(".bubble");
    bub.textContent=m.text||"";                        // 文字可空（纯图消息）
    if(m.image){
      if(!m.text) bub.classList.add("imgonly");        // 纯图气泡瘦一圈
      const img=document.createElement("img");
      img.className="pic"; img.alt="图片"; img.loading="lazy";
      // 演示态 image 是 dataURL 直接用；接通态 image 是文件名，走 /api/image 读
      img.src=m.image.startsWith("data:") ? m.image : API_BASE+"/api/image?name="+encodeURIComponent(m.image);
      img.addEventListener("click",()=>window.open(img.src,"_blank"));   // 点开看大图
      bub.appendChild(img);
    }
    stream.appendChild(el);
  }
  stream.scrollTop=stream.scrollHeight;
}

async function refresh(){
  if(!API_BASE) return;
  try{
    const all=await (await fetch(API_BASE+"/api/messages")).json();
    if(!Array.isArray(all)) return;
    const newSig=all.length+"|"+(all.length?all[all.length-1].t:"");
    if(newSig!==sig){ messages=all; sig=newSig; render(); }   // 有变化才重铺，平时不闪
  }catch(e){ /* 后端在睡，下回再取 */ }
}

async function send(){
  const text=box.value.trim(); if(!text) return;
  box.value=""; box.style.height="auto";
  if(API_BASE){
    try{
      // 不带 content-type：避开跨域预检；后端用 force=True 照样能解析 JSON
      await fetch(API_BASE+"/api/messages",{method:"POST",body:JSON.stringify({who,text})});
    }catch(e){ /* 没接住回执没关系：话多半已进后端，下面直接从后端拉回来 */ }
    await refresh();   // 后端才是底，发完把整段取回来重铺，刚发那句一定在
  }else{
    messages.push({who,text,t:new Date().toISOString()}); render();
  }
}

whoPick.addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  who=b.dataset.w;
  [...whoPick.querySelectorAll("button")].forEach(c=>c.classList.toggle("on",c===b));
  box.focus();
});
sendBtn.addEventListener("click",send);
box.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});
box.addEventListener("input",()=>{box.style.height="auto";box.style.height=Math.min(box.scrollHeight,100)+"px";});

// 传图：选图 → 上传拿文件名 → 连同可选文字发一条带图消息（文字可空 = 纯图）
imgBtn.addEventListener("click",()=>{ if(!imgBtn.disabled) imgInput.click(); });
imgInput.addEventListener("change",async()=>{
  const file=imgInput.files[0]; imgInput.value=""; if(!file) return;   // 清空便于再选同一张
  if(file.size>5*1024*1024){ alert("图太大啦，上限 5MB"); return; }
  const dataURL=await new Promise((res)=>{
    const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>res(null); r.readAsDataURL(file);
  });
  if(!dataURL){ alert("图片读不出来，换一张试试"); return; }
  const caption=box.value.trim();    // 可带一句说明，也可纯图
  imgBtn.disabled=true;              // 上传中先锁住，免得连点重发
  try{
    if(API_BASE){
      const up=await (await fetch(API_BASE+"/api/upload",{method:"POST",body:JSON.stringify({data:dataURL})})).json();
      if(up && up.error){ alert("上传失败："+up.error); return; }
      await fetch(API_BASE+"/api/messages",{method:"POST",body:JSON.stringify({who,text:caption,image:up.image})});
      box.value=""; box.style.height="auto";
      await refresh();               // 后端为底，发完整段取回重铺
    }else{
      messages.push({who,text:caption,image:dataURL,t:new Date().toISOString()});  // 演示态直接用 dataURL 显示
      box.value=""; box.style.height="auto"; render();
    }
  }catch(e){ alert("发图出错了，再试一次"); }
  finally{ imgBtn.disabled=false; }
});

// 导出：点了让浏览器去后端下载全部聊天记录（默认 .json；要可读文本可在地址后加 ?format=txt）
exportBtn.addEventListener("click",()=>{
  if(API_BASE){ window.open(API_BASE+"/api/export","_blank"); }
});

function tick(){const n=new Date();
  document.getElementById("clock").textContent=String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");
  document.getElementById("date").textContent=(n.getMonth()+1)+"月"+n.getDate()+"日";}
tick(); setInterval(tick,10000);

async function init(){
  if(API_BASE){
    linkEl.classList.add("on"); linkTxt.textContent="已接通";
    noteEl.textContent="已接通后端 · 三方实时同步";
    await refresh();            // 初次拉全量
    setInterval(refresh,3000);  // 每 3 秒对一次，有新话才铺上来
  }else{
    messages=DEMO.slice(); render();
  }
}
init();
</script>
</body>
</html>
